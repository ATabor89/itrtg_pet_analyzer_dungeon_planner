# ============================================================================
# ITRTG Dungeon Recommendations
# ============================================================================
# Structured data for all in-game dungeon recommendations.
# Format designed for programmatic ingestion.
#
# Equipment tiers: T1 (Basic), T2 (Shaping), T3 (Magic), T4 (Legendary)
# Enhancement format: +N (e.g., +10, +20)
# Grade format: S, SS, SSS
# Gem types: fire, water, wind, earth, neutral
# Gem level: minimum recommended gem level (e.g., 10)
# Elements: fire, water, wind, earth, neutral, any
# Classes: assassin, rogue, defender, supporter, mage, blacksmith, any
#
# Party ordering: Positions 1-3 are front row, positions 4-6 are back row.
# Order is preserved as listed in-game.
#
# D2 general rules: All equipment T2 S+10. Gems on weapon only, level 10+.
# D3 general rules: All equipment T3 S+10. Gems on all slots, level 10+.
#
# Event countered_by: When a single object, all conditions are AND.
# When a list, each entry is a separate requirement (all must be met).
# ============================================================================

