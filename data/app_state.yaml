# ============================================================================
# Pet Planner App State
# ============================================================================
# Single source of truth for user-editable state. The tool loads this file on
# launch and auto-saves it back when you change anything in the UI. Hand-edits
# are fine while the tool is closed — on next save the file will be rewritten
# in the serializer's canonical form and any comments you add will be lost.
# ============================================================================

version: 1

default_dungeons:
  - dungeon: Scrapyard
    depth: 2
  - dungeon: WaterTemple
    depth: 2
  - dungeon: Forest
    depth: 2

inventory:
  godly_hammer: 2
  candy_cane: 2
  magic_egg_weapon: 2
  haposti: 0
  gram: 0
  wonder_axe: 0
  rune_patch: 0
  creators_vest: 2
  merry_mantle: 2
  learning_coat: 2
  enlightment_vest: 2
  spectrometers: 2
  master_gloves: 2
  growing_love_pendant: 2
  christmas_boots: 2

equipment_standards: {}

constraints:
  forbidden:
    - Ape
    - God Power (Pet)
    - Honey Badger
    - Panda
    - Raven
    - Witch
  forced:
    - pet: Egg/Chicken
      dungeon: Scrapyard
    - pet: Rudolph
      dungeon: Scrapyard
    - pet: Dog
      dungeon: Scrapyard
    - pet: Dragon
      dungeon: Scrapyard
    - pet: Slime
      dungeon: Scrapyard
    - pet: Salamander
      dungeon: Scrapyard
    - pet: Penguin
      dungeon: WaterTemple
    - pet: Clam
      dungeon: WaterTemple
    - pet: Frog
      dungeon: WaterTemple
    - pet: Fairy
      dungeon: WaterTemple
    - pet: Rabbit
      dungeon: WaterTemple
    - pet: Cat
      dungeon: Forest
    - pet: Squirrel
      dungeon: Forest
    - pet: Armadillo
      dungeon: Forest
    - pet: Sylph
      dungeon: Forest
    - pet: Mist Sphere
      dungeon: Forest
    - pet: Serow
      dungeon: Forest
  whitelisted: []
