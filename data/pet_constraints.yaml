# Pet Constraints for the Dungeon Planner
#
# Forbidden: pets excluded from ALL dungeon teams.
# Use this for pets you want to keep on campaigns, village jobs,
# or otherwise don't want the solver touching.
#
# Forced: pets that MUST appear in a dungeon team.
# Optionally specify a dungeon to pin them to a specific team.
# Omit the dungeon to let the solver pick the best fit.
#
# Whitelisted: pets that bypass the non-dungeon class filter.
# Use for Blacksmiths/Alchemists/Adventurers that actually benefit
# from dungeon runs (e.g. special abilities, class XP exceptions).
#
# Dungeon names: Scrapyard, WaterTemple, Volcano, Mountain, Forest

forbidden:
  - Ape
  - God Power (Pet)
  - Honey Badger
  - Panda
  - Raven
  - Witch

forced:
  - pet: Egg/Chicken
    dungeon: Scrapyard
  - pet: Rudolph
    dungeon: Scrapyard
  - pet: Dog
    dungeon: Scrapyard
  - pet: Dragon
    dungeon: Scrapyard
  - pet: Slime
    dungeon: Scrapyard
  - pet: Penguin
    dungeon: WaterTemple
  - pet: Clam
    dungeon: WaterTemple
  - pet: Frog
    dungeon: WaterTemple
  - pet: Fairy
    dungeon: WaterTemple
  - pet: Rabbit
    dungeon: WaterTemple
  - pet: Cat
    dungeon: Forest
  - pet: Squirrel
    dungeon: Forest
  - pet: Armadillo
    dungeon: Forest
  - pet: Sylph
    dungeon: Forest
  - pet: Mist Sphere
    dungeon: Forest
  - pet: Serow
    dungeon: Forest
  - pet: Salamander
    dungeon: Scrapyard

whitelisted:
  # - Pet Name
