# ============================================================================
# ITRTG Equipment Catalog
# ============================================================================
# All equipment in the game, organized by slot (weapons, armor, accessories).
# Format designed for programmatic ingestion.
#
# Equipment tiers: T1 (Basic), T2 (Shaping), T3 (Magic), T4 (Legendary), T5 (Mythic)
# Enhancement format: +N (e.g., +10, +20)
# Grade format: S, SS, SSS
# Elements: Fire, Water, Wind, Earth, Neutral
#
# Stats (stats_a0): HP, Atk, Def, Spd percentages at Quality A, +0
# Resistances: Absolute element values at Quality A, +0
# source: How equipment is obtained (crafted, premium_event, tavern_quest, etc.)
# max_quantity: Maximum number obtainable (omitted = unlimited/craftable)
# dungeon_relevant: false if item should be excluded from dungeon planning
# ============================================================================

